<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --header-bg: #0f172a;
      --header-gradient: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0e4d6e 100%);
      --accent: #f97316;
      --accent-hover: #ea6c0a;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
      --inline-code-bg: #f1f5f9;
      --inline-code-text: #0f4c75;
      --link: #0369a1;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 16px;
    }

    /* ── Header ── */
    header {
      background: var(--header-gradient);
      color: #fff;
      padding: 64px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(249,115,22,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    header .badge {
      display: inline-block;
      background: rgba(249,115,22,0.2);
      border: 1px solid rgba(249,115,22,0.4);
      color: #fdba74;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    header h1 span { color: var(--accent); }
    header p.subtitle {
      font-size: 1.1rem;
      color: #94a3b8;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Scroll indicator ── */
    .scroll-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #475569;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .scroll-hint .arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid #475569;
      border-bottom: 2px solid #475569;
      transform: rotate(45deg);
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(5px); }
    }

    /* ── Layout ── */
    .wrapper {
      max-width: 860px;
      margin: -32px auto 60px;
      padding: 0 20px;
    }

    /* ── Content card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 52px;
      border: 1px solid var(--border);
    }
    @media (max-width: 640px) {
      .card { padding: 28px 22px; }
    }

    /* ── Typography ── */
    h1, h2, h3, h4 {
      color: var(--text);
      font-weight: 700;
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 0.6em;
    }
    h1 { font-size: 1.9rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
    h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    h3 { font-size: 1.15rem; color: var(--text-muted); }
    h4 { font-size: 1rem; }

    p { margin-bottom: 1em; }

    a { color: var(--link); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; color: var(--accent-hover); }

    /* ── Lists ── */
    ul, ol {
      padding-left: 1.5em;
      margin-bottom: 1em;
    }
    li { margin-bottom: 0.35em; }
    li::marker { color: var(--accent); }

    /* ── Code ── */
    pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 20px 24px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.65;
      margin: 1.2em 0;
      border-left: 3px solid var(--accent);
    }
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875em;
      background: var(--inline-code-bg);
      color: var(--inline-code-text);
      padding: 2px 7px;
      border-radius: 5px;
    }
    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
    }

    /* ── Blockquote ── */
    blockquote {
      border-left: 4px solid var(--accent);
      background: #fff8f0;
      margin: 1.2em 0;
      padding: 14px 20px;
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-size: 0.9rem;
    }
    th {
      background: var(--header-bg);
      color: #e2e8f0;
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
    }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #f8fafc; }

    /* ── Details/Summary ── */
    details {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 1em 0;
      padding: 4px 16px;
    }
    summary {
      font-weight: 600;
      cursor: pointer;
      padding: 12px 0;
      color: var(--link);
      user-select: none;
    }
    summary:hover { color: var(--accent); }
    details[open] summary { border-bottom: 1px solid var(--border); margin-bottom: 12px; }

    /* ── HR ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="badge">AWS CDK Playground</div>
  <h1>CDK <span>Playground</span></h1>
  <p class="subtitle">Various cloud infrastructure built with AWS CloudFormation &amp; Infrastructure as Code</p>
  <div class="scroll-hint"><div class="arrow"></div></div>
</header>

<div class="wrapper">
  <div class="card">
    $body$
  </div>
</div>

<footer>
  Built with <a href="https://aws.amazon.com/cdk/" target="_blank">AWS CDK</a> &nbsp;·&nbsp;
  <a href="https://github.com/yennanliu/cdk-playground" target="_blank">GitHub</a>
</footer>

</body>
</html>
