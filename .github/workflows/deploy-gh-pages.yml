name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - '.github/workflows/deploy-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert README.md to HTML
        run: |
          mkdir -p _site
          pandoc README.md \
            --from markdown \
            --to html5 \
            --standalone \
            --metadata title="CDK Playground" \
            --css https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css \
            --output _site/index.html
          # Wrap in github-markdown-body div for styling
          sed -i 's/<body>/<body><article class="markdown-body" style="max-width:900px;margin:40px auto;padding:20px">/' _site/index.html
          sed -i 's/<\/body>/<\/article><\/body>/' _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
