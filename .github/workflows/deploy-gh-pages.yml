name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - '.github/workflows/deploy-gh-pages.yml'
      - '.github/templates/page.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert README.md to HTML
        run: |
          mkdir -p _site
          pandoc README.md \
            --from markdown \
            --to html5 \
            --template .github/templates/page.html \
            --metadata title="CDK Playground" \
            --output _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
